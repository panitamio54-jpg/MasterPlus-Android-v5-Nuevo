name: Compilador APK MasterPlus v7 PiP Solo Reproductor

on:
  workflow_dispatch:

jobs:
  construir:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v7
        run: |
          rm -rf proyecto-v7
          mkdir proyecto-v7
          unzip -o "MasterPlus_Android_v7_PiP_Solo_Reproductor.zip" -d proyecto-v7
          cd proyecto-v7/mp7
          cp -a . "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v7-PiP-Solo-Reproductor-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
