name: Compilador APK MasterPlus v16 Estadisticas Token Real

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v16
        run: |
          rm -rf proyecto-v16
          mkdir proyecto-v16
          unzip -o "MasterPlus_Android_v16_Estadisticas_Token_Real.zip" -d proyecto-v16
          cp -a proyecto-v16/mp16analytics/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos
        run: chmod +x gradlew 2>/dev/null || true

      - name: Verificar v16
        run: |
          grep -q 'versionName "2.4.0"' app/build.gradle
          grep -q "localStorage.getItem('mp_token')" app/src/main/java/com/teletop/masterplus/MainActivity.java
          grep -q 'Authorization' app/src/main/java/com/teletop/masterplus/AnalyticsReporter.java
          grep -q 'X-Device-ID' app/src/main/java/com/teletop/masterplus/AnalyticsReporter.java

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v16-Estadisticas-Token-Real-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
