name: Compilador APK MasterPlus v13 Configuracion Visible R1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Descomprimir proyecto v13 R1
        run: |
          rm -rf proyecto-v13-r1
          mkdir proyecto-v13-r1
          unzip -o "MasterPlus_Android_v13_Configuracion_VISIBLE_R1.zip" -d proyecto-v13-r1
          cp -a proyecto-v13-r1/mp13fix/. "$GITHUB_WORKSPACE/"
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - name: Dar permisos al proyecto
        run: chmod +x gradlew 2>/dev/null || true
      - name: Compilar APK
        run: gradle assembleDebug --stacktrace
      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v13-Configuracion-Visible-R1-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
