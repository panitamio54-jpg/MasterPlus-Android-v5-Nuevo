name: Compilador APK MasterPlus v10 FINAL Audio Fondo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v10
        run: |
          rm -rf proyecto-v10
          mkdir proyecto-v10
          unzip -o "MasterPlus_Android_v10_FINAL_Pantalla_Encendida_Audio_Fondo.zip" -d proyecto-v10
          cp -a proyecto-v10/mp10/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos al proyecto
        run: chmod +x gradlew 2>/dev/null || true

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v10-FINAL-Audio-Fondo-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
