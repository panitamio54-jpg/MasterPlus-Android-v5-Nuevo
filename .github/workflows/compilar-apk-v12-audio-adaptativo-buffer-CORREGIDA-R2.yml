name: Compilador APK MasterPlus v12 Audio Adaptativo Buffer CORREGIDA R2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v12 corregido R2
        run: |
          rm -rf proyecto-v12
          mkdir proyecto-v12
          unzip -o "MasterPlus_Android_v12_Audio_Adaptativo_Buffer_CORREGIDA_R2.zip" -d proyecto-v12
          cp -a proyecto-v12/mp12/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos al proyecto
        run: chmod +x gradlew 2>/dev/null || true

      - name: Validar AndroidManifest
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('app/src/main/AndroidManifest.xml'); print('Manifest XML válido')"

      - name: Compilar APK
        run: gradle assembleDebug --stacktrace

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v12-Audio-Adaptativo-Buffer-CORREGIDA-R2-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
