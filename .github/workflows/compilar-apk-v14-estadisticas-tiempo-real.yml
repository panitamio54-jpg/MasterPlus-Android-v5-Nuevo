name: Compilador APK MasterPlus v14 Estadisticas Tiempo Real

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v14
        run: |
          rm -rf proyecto-v14
          mkdir proyecto-v14
          unzip -o "MasterPlus_Android_v14_Estadisticas_Tiempo_Real.zip" -d proyecto-v14
          cp -a proyecto-v14/mp14analytics/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos al proyecto
        run: chmod +x gradlew 2>/dev/null || true

      - name: Verificar v14 y analytics
        run: |
          grep -q 'versionName "2.2.0"' app/build.gradle
          test -f app/src/main/java/com/teletop/masterplus/AnalyticsReporter.java
          grep -q 'analyticsHeartbeat' app/src/main/java/com/teletop/masterplus/MainActivity.java

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v14-Estadisticas-Tiempo-Real-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
