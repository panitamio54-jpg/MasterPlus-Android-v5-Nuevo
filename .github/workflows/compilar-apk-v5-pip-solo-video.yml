name: Compilador APK MasterPlus v5 PiP Solo Video Corregido

on:
  workflow_dispatch:

jobs:
  construir:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto corregido
        run: |
          unzip -o "MasterPlus_Android_v5_PiP_Solo_Video_Proyecto_CORREGIDO.zip"
          cp -r MasterPlus_Android_v5_PiP_Solo_Video/. .

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos
        run: |
          chmod +x gradlew 2>/dev/null || true

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v5-PiP-Solo-Video-Corregido-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
