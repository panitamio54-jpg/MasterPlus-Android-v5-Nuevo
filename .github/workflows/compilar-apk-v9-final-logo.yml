name: Compilador APK MasterPlus v9 FINAL Logo y PiP Nativo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto final
        run: |
          rm -rf proyecto-final
          mkdir proyecto-final
          unzip -o "MasterPlus_Android_v9_FINAL_Logo_PiP_Nativo.zip" -d proyecto-final
          cp -a proyecto-final/mp9/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v9-FINAL-Logo-PiP-Nativo-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
