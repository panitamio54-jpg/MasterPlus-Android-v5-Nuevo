name: Compilador APK MasterPlus v13 Configuracion Audio Fondo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v13
        run: |
          rm -rf proyecto-v13
          mkdir proyecto-v13
          unzip -o "MasterPlus_Android_v13_Configuracion_Audio_Fondo.zip" -d proyecto-v13
          cp -a proyecto-v13/mp13/. "$GITHUB_WORKSPACE/"

      - name: Validar archivos principales
        run: |
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/java/com/teletop/masterplus/MainActivity.java
          test -f app/src/main/java/com/teletop/masterplus/BackgroundAudioService.java
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse('app/src/main/AndroidManifest.xml')
          print('AndroidManifest.xml correcto')
          PY
          grep -q 'versionCode 13' app/build.gradle
          grep -q 'ACTION_PLAYBACK_READY' app/src/main/java/com/teletop/masterplus/BackgroundAudioService.java

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos al proyecto
        run: chmod +x gradlew 2>/dev/null || true

      - name: Compilar APK
        run: gradle assembleDebug --stacktrace

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v13-Configuracion-Audio-Fondo-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
