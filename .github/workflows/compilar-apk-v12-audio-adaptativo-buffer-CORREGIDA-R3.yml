name: Compilador APK MasterPlus v12 Audio Adaptativo Buffer CORREGIDA R3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v12 corregido R3
        run: |
          rm -rf proyecto-v12
          mkdir proyecto-v12
          unzip -o "MasterPlus_Android_v12_Audio_Adaptativo_Buffer_CORREGIDA_R3.zip" -d proyecto-v12
          cp -a proyecto-v12/mp12/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Validar archivos críticos
        run: |
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/java/com/teletop/masterplus/BackgroundAudioService.java
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse('app/src/main/AndroidManifest.xml')
          print('AndroidManifest.xml válido')
          PY
          if grep -R "androidx.annotation.Nullable\|android.annotation.Nullable" -n app/src/main/java; then
            echo "Se encontró una anotación Nullable no permitida" >&2
            exit 1
          fi

      - name: Compilar APK
        run: gradle assembleDebug --stacktrace

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v12-Audio-Adaptativo-Buffer-CORREGIDA-R3-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
