name: Compilador APK MasterPlus v11 Listas Independientes

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v11
        run: |
          rm -rf proyecto-v11
          mkdir proyecto-v11
          unzip -o "MasterPlus_Android_v11_Listas_Independientes.zip" -d proyecto-v11
          cp -a proyecto-v11/mp11/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos al proyecto
        run: chmod +x gradlew 2>/dev/null || true

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v11-Listas-Independientes-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
