name: Compilador APK MasterPlus v13 Configuracion Debajo Contactanos FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v13 final
        run: |
          rm -rf proyecto-v13-final
          mkdir proyecto-v13-final
          unzip -o "MasterPlus_Android_v13_Configuracion_Debajo_Contactanos_FINAL.zip" -d proyecto-v13-final
          cp -a proyecto-v13-final/mp13fix/. "$GITHUB_WORKSPACE/"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Dar permisos al proyecto
        run: chmod +x gradlew 2>/dev/null || true

      - name: Verificar cambio puntual
        run: |
          grep -q "findExact('contáctanos')" app/src/main/java/com/teletop/masterplus/MainActivity.java
          grep -q "versionName \"2.1.3\"" app/build.gradle

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v13-Configuracion-Debajo-Contactanos-FINAL-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
